<h1>文明シミュレーター</h1>

人口: <span id="population">0</span><br>
技術: <span id="technology">0</span><br>

<button onclick="updateGame()">ターン進行</button>
<button onclick="save()">保存</button>

<script type="module">

import { updateGame, saveStats } from './game.js'
import { supabase } from './supabase.js'

window.updateGame = updateGame

window.save = async () => {
  const { data: { user } } = await supabase.auth.getUser()
  saveStats(user.id)
}

</script>
